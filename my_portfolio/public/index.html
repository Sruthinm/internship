<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Portfolio</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background: #0f172a;
      color: white;
    }

    header{
      width: 100%;
      padding: 20px 10%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      position: fixed;
      top: 0;
    }

    .logo{
      font-size: 28px;
      font-weight: bold;
      color: #38bdf8;
    }

    nav a{
      color: white;
      text-decoration: none;
      margin-left: 25px;
      transition: 0.3s;
    }

    nav a:hover{
      color: #38bdf8;
    }

    .hero{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .hero-content h1{
      font-size: 60px;
      margin-bottom: 15px;
    }

    .hero-content h1 span{
      color: #38bdf8;
    }

    .hero-content p{
      font-size: 20px;
      margin-bottom: 25px;
      color: #cbd5e1;
    }

    .btn{
      display: inline-block;
      padding: 12px 28px;
      background: #38bdf8;
      color: #0f172a;
      text-decoration: none;
      border-radius: 30px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover{
      background: white;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">Portfolio</div>

    <nav>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Projects</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-content">
      <h1>Hello, I'm <span>Sruthin</span></h1>

      <p>
        Computer Science Student | Web Developer | Data Science Enthusiast
      </p>

      <a href="#" class="btn">View My Work</a>
    </div>
  </section>

</body>
</html>
